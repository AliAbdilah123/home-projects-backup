user nginx;
worker_processes auto;
error_log /home/opc/nginx-content/wiki/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  access_log /home/opc/nginx-content/wiki/access.log;

  upstream demo_backend {
    server 127.0.0.1:8080;
  }

  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      default_type text/plain;
      root /home/opc/nginx-content/wiki/.well-known/acme-challenge;
    }

    # User explicitly requested domain mapping:
    # /wiki/* -> http://10.0.38.80/api/v1/*
    location /wiki/ {
      proxy_pass http://demo_backend/api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Keep existing API prefix working on the public path.
    location /api/v1/ {
      proxy_pass http://demo_backend/api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the React build from /projects/demo/
    location /projects/demo/ {
      alias /home/opc/projects/demo/frontend/dist/;
      index index.html;
      try_files $uri $uri/ /projects/demo/index.html;
    }

    # Fallback static content from nginx content dir
    location / {
      root /home/opc/nginx-content/wiki;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
