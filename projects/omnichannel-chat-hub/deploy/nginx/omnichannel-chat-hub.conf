# Add these location blocks inside the existing default server (:80).
# Keep only one default_server on port 80.

location /projects/omnichannel-chat-hub/api/v1/ {
    proxy_pass http://127.0.0.1:8080/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /projects/omnichannel-chat-hub/ {
    alias /usr/share/nginx/html/projects/omnichannel-chat-hub/;
    index index.html;
    try_files $uri $uri/ /projects/omnichannel-chat-hub/index.html;
}
